[General]
network        = charon.CharonRing
sim-time-limit = 200s
**.cmdenv-output-file = results/charon-run.log

[Config ER_baseline]
*.numNodes  = 100
*.t         = 5
*.c         = 3
*.deltaMax  = 6

# Mark 5% of nodes Byzantine (worst-case placement A1)
*.node[0].byzantine   = true
*.node[0].byzBehavior = 1    # selective forwarding
*.node[1].byzantine   = true
*.node[1].byzBehavior = 0    # silent

[Config Ripple_subsampled]
*.numNodes = 5000
*.t        = 50
*.c        = 5
*.deltaMax = 8
